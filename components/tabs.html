<!doctype html>
<html lang="en" dir="ltr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buttons | Abu Faisal Design System</title>
    <script type="module" src="/src/js/main.js"></script>
  </head>

  <body>
    <main class="section">
      <div class="container">
        <div class="d-flex justify-between align-center flex-wrap gap-3 mb-8">
          <div>
            <h1>Button System</h1>
            <p>
              Testing sharp buttons, rounded buttons, colors, states, theme,
              language, and RTL.
            </p>
          </div>

          <div class="d-flex flex-wrap gap-2">
            <button
              class="btn btn-outline-primary btn-sm"
              data-theme-set="light"
            >
              Light
            </button>

            <button
              class="btn btn-outline-primary btn-sm"
              data-theme-set="dark"
            >
              Dark
            </button>

            <button
              class="btn btn-primary btn-sm btn-rounded"
              data-theme-toggle
            >
              Toggle Theme
            </button>

            <button class="btn btn-outline-accent btn-sm" data-lang-set="en">
              English
            </button>

            <button class="btn btn-outline-accent btn-sm" data-lang-set="ar">
              العربية
            </button>

            <button class="btn btn-accent btn-sm btn-rounded" data-lang-toggle>
              Toggle Lang
            </button>
          </div>
        </div>

        <section class="mt-8">
          <h2 class="mb-4">Tabs System</h2>

          <div class="tabs card">
            <div class="card-body">
              <div class="tabs-nav">
                <button class="tab-link active" data-tab-target="tab-overview">
                  Overview
                </button>

                <button class="tab-link" data-tab-target="tab-financials">
                  Financials
                </button>

                <button class="tab-link" data-tab-target="tab-news">
                  News
                </button>
              </div>

              <div class="tabs-content">
                <div id="tab-overview" class="tab-pane active">
                  Overview content
                </div>

                <div id="tab-financials" class="tab-pane">
                  Financial data content
                </div>

                <div id="tab-news" class="tab-pane">News content</div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
