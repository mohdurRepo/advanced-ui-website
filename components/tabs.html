<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script>
      (function () {
        var root = document.documentElement;

        var lang = localStorage.getItem("se-lang") || "en";
        var themeChoice = localStorage.getItem("se-theme") || "system";
        var accent = localStorage.getItem("se-accent") || "blue";
        var fontSize = localStorage.getItem("se-font-size") || "0";
        var contrast = localStorage.getItem("se-contrast") || "normal";
        var motion = localStorage.getItem("se-motion") || "normal";

        var systemTheme =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";

        var resolvedTheme =
          themeChoice === "system" ? systemTheme : themeChoice;

        root.lang = lang === "ar" ? "ar" : "en";
        root.dir = lang === "ar" ? "rtl" : "ltr";

        root.setAttribute("data-theme", resolvedTheme);
        root.setAttribute("data-theme-choice", themeChoice);
        root.setAttribute("data-accent", accent);
        root.setAttribute("data-font-size", fontSize);
        root.setAttribute("data-contrast", contrast);
        root.setAttribute("data-motion", motion);
      })();
    </script>

    <link rel="stylesheet" href="/src/scss/main.scss" />
    <title>Icons | Abu Faisal Design System</title>
    <script type="module" src="/src/js/main.js"></script>
  </head>

  <body>
    <main class="section">
      <div class="container">
        <div class="d-flex justify-between align-center flex-wrap gap-3 mb-8">
          <div>
            <h1>Icon System</h1>
            <p>
              Class-based icons for buttons, lists, cards, and SVG sprite usage.
            </p>
          </div>

          <div class="d-flex flex-wrap gap-2">
            <button
              class="btn btn-outline-primary btn-sm"
              data-theme-set="light"
            >
              Light
            </button>
            <button
              class="btn btn-outline-primary btn-sm"
              data-theme-set="dark"
            >
              Dark
            </button>
            <button
              class="btn btn-primary btn-sm btn-rounded"
              data-theme-toggle
            >
              Toggle Theme
            </button>
            <button class="btn btn-outline-accent btn-sm" data-lang-set="en">
              English
            </button>
            <button class="btn btn-outline-accent btn-sm" data-lang-set="ar">
              العربية
            </button>
          </div>
        </div>

        <section class="mt-8">
          <h2 class="mb-4">Tabs System</h2>

          <div class="tabs tabs--full card">
            <div class="card-body">
              <div class="tabs-nav">
                <button class="tab-link active" data-tab-target="tab-overview">
                  Overview Overview Overview
                </button>

                <button class="tab-link" data-tab-target="tab-financials">
                  Financials Overview Overview
                </button>

                <button class="tab-link" data-tab-target="tab-news">
                  News Overview Overview Overview
                </button>
              </div>

              <div class="tabs-content">
                <div id="tab-overview" class="tab-pane active">
                  Overview content
                </div>

                <div id="tab-financials" class="tab-pane">
                  Financial data content
                </div>

                <div id="tab-news" class="tab-pane">News content</div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
