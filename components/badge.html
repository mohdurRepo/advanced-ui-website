<!doctype html>
<html lang="en" dir="ltr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buttons | Abu Faisal Design System</title>
    <script type="module" src="/src/js/main.js"></script>
  </head>

  <body>
    <main class="section">
      <div class="container">
        <div class="d-flex justify-between align-center flex-wrap gap-3 mb-8">
          <div>
            <h1>Button System</h1>
            <p>
              Testing sharp buttons, rounded buttons, colors, states, theme,
              language, and RTL.
            </p>
          </div>

          <div class="d-flex flex-wrap gap-2">
            <button
              class="btn btn-outline-primary btn-sm"
              data-theme-set="light"
            >
              Light
            </button>

            <button
              class="btn btn-outline-primary btn-sm"
              data-theme-set="dark"
            >
              Dark
            </button>

            <button
              class="btn btn-primary btn-sm btn-rounded"
              data-theme-toggle
            >
              Toggle Theme
            </button>

            <button class="btn btn-outline-accent btn-sm" data-lang-set="en">
              English
            </button>

            <button class="btn btn-outline-accent btn-sm" data-lang-set="ar">
              العربية
            </button>

            <button class="btn btn-accent btn-sm btn-rounded" data-lang-toggle>
              Toggle Lang
            </button>
          </div>
        </div>

        <section class="mt-8">
          <h2 class="mb-4">Badge System</h2>

          <div class="card">
            <div class="card-body">
              <div class="d-flex flex-wrap gap-3 mb-4">
                <span class="badge badge-primary">Primary</span>
                <span class="badge badge-secondary">Secondary</span>
                <span class="badge badge-accent">Accent</span>
                <span class="badge badge-success">Success</span>
                <span class="badge badge-info">Info</span>
                <span class="badge badge-warning">Warning</span>
                <span class="badge badge-danger">Danger</span>
                <span class="badge badge-light">Light</span>
                <span class="badge badge-dark">Dark</span>
              </div>

              <div class="d-flex flex-wrap gap-3">
                <span class="badge badge-outline-primary badge-rounded"
                  >Primary</span
                >
                <span class="badge badge-outline-success badge-rounded"
                  >Success</span
                >
                <span class="badge badge-outline-warning badge-rounded"
                  >Warning</span
                >
                <span class="badge badge-outline-danger badge-rounded"
                  >Danger</span
                >
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
