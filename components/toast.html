<!doctype html>
<html lang="en" dir="ltr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buttons | Abu Faisal Design System</title>
    <script type="module" src="/src/js/main.js"></script>
  </head>

  <body>
    <main class="section">
      <div class="container">
        <div class="d-flex justify-between align-center flex-wrap gap-3 mb-8">
          <div>
            <h1>Button System</h1>
            <p>
              Testing sharp buttons, rounded buttons, colors, states, theme,
              language, and RTL.
            </p>
          </div>

          <div class="d-flex flex-wrap gap-2">
            <button
              class="btn btn-outline-primary btn-sm"
              data-theme-set="light"
            >
              Light
            </button>

            <button
              class="btn btn-outline-primary btn-sm"
              data-theme-set="dark"
            >
              Dark
            </button>

            <button
              class="btn btn-primary btn-sm btn-rounded"
              data-theme-toggle
            >
              Toggle Theme
            </button>

            <button class="btn btn-outline-accent btn-sm" data-lang-set="en">
              English
            </button>

            <button class="btn btn-outline-accent btn-sm" data-lang-set="ar">
              العربية
            </button>

            <button class="btn btn-accent btn-sm btn-rounded" data-lang-toggle>
              Toggle Lang
            </button>
          </div>
        </div>

        <section class="mt-8">
          <h2 class="mb-4">Toast Notification System</h2>

          <div class="card">
            <div class="card-body">
              <div class="d-flex flex-wrap gap-3">
                <button
                  class="btn btn-primary btn-rounded"
                  data-toast="primary"
                  data-toast-title="Primary Notification"
                  data-toast-message="This is a general system notification."
                >
                  Primary Toast
                </button>

                <button
                  class="btn btn-success btn-rounded"
                  data-toast="success"
                  data-toast-title="Success"
                  data-toast-message="Your changes have been saved successfully."
                >
                  Success Toast
                </button>

                <button
                  class="btn btn-info btn-rounded"
                  data-toast="info"
                  data-toast-title="Information"
                  data-toast-message="Market data was updated recently."
                >
                  Info Toast
                </button>

                <button
                  class="btn btn-warning btn-rounded"
                  data-toast="warning"
                  data-toast-title="Warning"
                  data-toast-message="Please review the information before continuing."
                >
                  Warning Toast
                </button>

                <button
                  class="btn btn-danger btn-rounded"
                  data-toast="danger"
                  data-toast-title="Error"
                  data-toast-message="Something went wrong. Please try again."
                >
                  Danger Toast
                </button>

                <button
                  class="btn btn-outline-primary"
                  data-toast="success"
                  data-toast-title="Persistent Toast"
                  data-toast-message="This toast will stay until you close it."
                  data-toast-duration="0"
                >
                  Persistent Toast
                </button>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
