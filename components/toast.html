<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script>
      (function () {
        var root = document.documentElement;

        var lang = localStorage.getItem("se-lang") || "en";
        var themeChoice = localStorage.getItem("se-theme") || "system";
        var accent = localStorage.getItem("se-accent") || "blue";
        var fontSize = localStorage.getItem("se-font-size") || "0";
        var contrast = localStorage.getItem("se-contrast") || "normal";
        var motion = localStorage.getItem("se-motion") || "normal";

        var systemTheme =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";

        var resolvedTheme =
          themeChoice === "system" ? systemTheme : themeChoice;

        root.lang = lang === "ar" ? "ar" : "en";
        root.dir = lang === "ar" ? "rtl" : "ltr";

        root.setAttribute("data-theme", resolvedTheme);
        root.setAttribute("data-theme-choice", themeChoice);
        root.setAttribute("data-accent", accent);
        root.setAttribute("data-font-size", fontSize);
        root.setAttribute("data-contrast", contrast);
        root.setAttribute("data-motion", motion);
      })();
    </script>

    <link rel="stylesheet" href="/src/scss/main.scss" />
    <title>Icons | Abu Faisal Design System</title>
    <script type="module" src="/src/js/main.js"></script>
  </head>

  <body>
    <main class="section">
      <div class="container">
        <div class="mb-8">
          <h1>Icon System</h1>
          <p>
            Class-based icons for buttons, lists, cards, and SVG sprite usage.
          </p>
        </div>

        <section class="mt-8">
          <h2 class="mb-4">Toast Notification System</h2>

          <div class="card">
            <div class="card-body">
              <div class="d-flex flex-wrap gap-3">
                <button
                  class="btn btn-primary btn-rounded"
                  data-toast="primary"
                  data-toast-title="Primary Notification"
                  data-toast-message="This is a general system notification."
                >
                  Primary Toast
                </button>

                <button
                  class="btn btn-success btn-rounded"
                  data-toast="success"
                  data-toast-title="Success"
                  data-toast-message="Your changes have been saved successfully."
                >
                  Success Toast
                </button>

                <button
                  class="btn btn-info btn-rounded"
                  data-toast="info"
                  data-toast-title="Information"
                  data-toast-message="Market data was updated recently."
                >
                  Info Toast
                </button>

                <button
                  class="btn btn-warning btn-rounded"
                  data-toast="warning"
                  data-toast-title="Warning"
                  data-toast-message="Please review the information before continuing."
                >
                  Warning Toast
                </button>

                <button
                  class="btn btn-danger btn-rounded"
                  data-toast="danger"
                  data-toast-title="Error"
                  data-toast-message="Something went wrong. Please try again."
                >
                  Danger Toast
                </button>

                <button
                  class="btn btn-outline-primary"
                  data-toast="success"
                  data-toast-title="Persistent Toast"
                  data-toast-message="This toast will stay until you close it."
                  data-toast-duration="0"
                >
                  Persistent Toast
                </button>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <!-- Floating Drawer Trigger -->
    <button
      class="drawer-toggle drawer-floating-trigger has-icon icon-theme-palette icon-lg"
      type="button"
      data-preferences-toggle
      aria-label="Open display settings"
      aria-expanded="false"
      aria-controls="preferences-drawer"
    ></button>

    <!-- Preferences Drawer -->
    <aside
      id="preferences-drawer"
      class="drawer"
      data-preferences
      aria-hidden="true"
    >
      <div class="drawer-backdrop" data-preferences-close></div>

      <div
        class="drawer-panel"
        data-preferences-panel
        role="dialog"
        aria-modal="true"
        aria-labelledby="preferences-title"
      >
        <header class="drawer-header">
          <div>
            <h2 id="preferences-title" class="drawer-title">
              Display Settings
            </h2>
            <p class="drawer-text">Customize your viewing experience.</p>
          </div>

          <button
            class="drawer-close has-icon icon-close-x"
            type="button"
            data-preferences-close
            aria-label="Close settings"
          ></button>
        </header>

        <div class="drawer-body">
          <section class="preferences-group">
            <h3 class="preferences-label">Theme</h3>
            <div class="preferences-options">
              <button
                class="btn btn-outline-primary btn-sm"
                data-preference="theme"
                data-preference-set="system"
              >
                System
              </button>
              <button
                class="btn btn-outline-primary btn-sm"
                data-preference="theme"
                data-preference-set="light"
              >
                Light
              </button>
              <button
                class="btn btn-outline-primary btn-sm"
                data-preference="theme"
                data-preference-set="dark"
              >
                Dark
              </button>
            </div>
          </section>

          <section class="preferences-group">
            <h3 class="preferences-label">Text Size</h3>
            <div class="preferences-options">
              <button class="btn btn-outline-primary btn-sm" data-font-decrease>
                A−
              </button>
              <button class="btn btn-outline-primary btn-sm" data-font-reset>
                A
              </button>
              <button class="btn btn-outline-primary btn-sm" data-font-increase>
                A+
              </button>
            </div>
          </section>

          <section class="preferences-group">
            <h3 class="preferences-label">Accent</h3>
            <div class="preferences-options">
              <button
                class="btn btn-outline-primary btn-sm"
                data-preference="accent"
                data-preference-set="blue"
              >
                Blue
              </button>
              <button
                class="btn btn-outline-primary btn-sm"
                data-preference="accent"
                data-preference-set="navy"
              >
                Navy
              </button>
              <button
                class="btn btn-outline-primary btn-sm"
                data-preference="accent"
                data-preference-set="teal"
              >
                Teal
              </button>
              <button
                class="btn btn-outline-primary btn-sm"
                data-preference="accent"
                data-preference-set="green"
              >
                Green
              </button>
              <button
                class="btn btn-outline-primary btn-sm"
                data-preference="accent"
                data-preference-set="grey"
              >
                Grey
              </button>
            </div>
          </section>

          <section class="preferences-group">
            <h3 class="preferences-label">Contrast</h3>
            <div class="preferences-options">
              <button
                class="btn btn-outline-primary btn-sm"
                data-preference="contrast"
                data-preference-set="normal"
              >
                Normal
              </button>
              <button
                class="btn btn-outline-primary btn-sm"
                data-preference="contrast"
                data-preference-set="high"
              >
                High
              </button>
            </div>
          </section>

          <section class="preferences-group">
            <h3 class="preferences-label">Motion</h3>
            <div class="preferences-options">
              <button
                class="btn btn-outline-primary btn-sm"
                data-preference="motion"
                data-preference-set="normal"
              >
                Normal
              </button>
              <button
                class="btn btn-outline-primary btn-sm"
                data-preference="motion"
                data-preference-set="reduce"
              >
                Reduce
              </button>
            </div>
          </section>

          <section class="preferences-group">
            <h3 class="preferences-label">Language</h3>
            <div class="preferences-options">
              <button
                class="btn btn-outline-primary btn-sm"
                data-preference="lang"
                data-preference-set="en"
              >
                English
              </button>
              <button
                class="btn btn-outline-primary btn-sm"
                data-preference="lang"
                data-preference-set="ar"
              >
                العربية
              </button>
            </div>
          </section>
        </div>
      </div>
    </aside>
  </body>
</html>
